<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>修复后的兼容HTML导出示例</title>
    <style>
        /* 这里展示修复后的CSS样式 */
        .social-media-export {
            max-width: 620px;
            margin: 0 auto;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', sans-serif;
            font-size: 14px;
            line-height: 1.5;
            color: #1d1d1f;
        }
        .social-media-export * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        .social-media-export img {
            max-width: 100%;
            height: auto;
            object-fit: cover;
        }
        
        /* 小红书修复样式 */
        .xhs-image-area { 
            width: 100%; 
            aspect-ratio: 3/4; 
            max-height: 520px; 
            overflow: hidden; 
        }
        .xhs-image-area img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
        }
        
        /* Instagram修复样式 */
        .ig-image-container { 
            width: 100%;
            aspect-ratio: 1; 
            max-height: 470px; 
            overflow: hidden; 
        }
        .ig-image-container img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
        }
    </style>
</head>
<body>
    <div class="social-media-export">
        <!-- 小红书示例 -->
        <div style="margin-bottom: 40px;">
            <h3 style="margin-bottom: 15px;">🔴 小红书图片示例</h3>
            <div class="xhs-image-area">
                <img src="https://picsum.photos/seed/xiaohongshu/400/600.jpg" alt="小红书图片">
            </div>
            <p style="margin-top: 10px; color: #666;">小红书图片应该保持3:4的宽高比，不会被压缩变形</p>
        </div>
        
        <!-- Instagram示例 -->
        <div style="margin-bottom: 40px;">
            <h3 style="margin-bottom: 15px;">📷 Instagram图片示例</h3>
            <div class="ig-image-container">
                <img src="https://picsum.photos/seed/instagram/600/600.jpg" alt="Instagram图片">
            </div>
            <p style="margin-top: 10px; color: #666;">Instagram图片应该保持1:1的正方形比例，不会被压缩变形</p>
        </div>
        
        <!-- 通用图片示例 -->
        <div>
            <h3 style="margin-bottom: 15px;">🎯 通用图片示例</h3>
            <img src="https://picsum.photos/seed/general/400/300.jpg" alt="通用图片" style="width: 100%; margin-bottom: 10px;">
            <p style="color: #666;">通用图片应该自动适配容器宽度，保持原始比例</p>
        </div>
    </div>
</body>
</html>
