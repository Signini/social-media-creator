<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>微信头像位置快速测试</title>
    <link rel="stylesheet" href="css/platform-wechat.css">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            margin: 0;
            padding: 20px;
            background: #f5f5f7;
        }
        .test-container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .test-info {
            background: #e8f4fd;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .test-success {
            background: #d4edda;
            color: #155724;
        }
        .test-error {
            background: #f8d7da;
            color: #721c24;
        }
    </style>
</head>
<body>
    <div class="test-container">
        <h1>🔧 微信头像位置修复测试</h1>
        
        <div class="test-info">
            <h3>🎯 测试目标：</h3>
            <ul>
                <li>接收消息：头像在左侧，消息在右侧</li>
                <li>发送消息：头像在右侧，消息在左侧</li>
                <li>头像背景为绿色 (#07c160)</li>
            </ul>
        </div>

        <div class="wx-chat">
            <div class="wx-messages">
                <!-- 接收到的消息 -->
                <div class="wx-msg-row">
                    <div class="wx-msg-avatar">张</div>
                    <div class="wx-msg-content">
                        <div class="wx-sender-name">张三</div>
                        <div class="wx-bubble wx-bubble-received">
                            <div class="wx-bubble-text">这是接收到的消息，头像应该在左侧。</div>
                        </div>
                        <div class="wx-bubble-meta">
                            <div class="wx-bubble-time">10:30</div>
                        </div>
                    </div>
                </div>

                <!-- 发送的消息 -->
                <div class="wx-msg-row wx-msg-row-sent">
                    <div class="wx-msg-avatar">我</div>
                    <div class="wx-msg-content">
                        <div class="wx-bubble wx-bubble-sent">
                            <div class="wx-bubble-text">这是发送的消息，头像现在应该在右侧了！</div>
                        </div>
                        <div class="wx-bubble-meta">
                            <div class="wx-bubble-time">10:32</div>
                        </div>
                    </div>
                </div>

                <!-- 另一个接收消息 -->
                <div class="wx-msg-row">
                    <div class="wx-msg-avatar">李</div>
                    <div class="wx-msg-content">
                        <div class="wx-sender-name">李四</div>
                        <div class="wx-bubble wx-bubble-received">
                            <div class="wx-bubble-text">很好，现在头像位置正确了。</div>
                        </div>
                        <div class="wx-bubble-meta">
                            <div class="wx-bubble-time">10:35</div>
                        </div>
                    </div>
                </div>

                <!-- 另一个发送消息 -->
                <div class="wx-msg-row wx-msg-row-sent">
                    <div class="wx-msg-avatar">我</div>
                    <div class="wx-msg-content">
                        <div class="wx-bubble wx-bubble-sent">
                            <div class="wx-bubble-text">是的，已发送消息头像现在在右侧，接收消息头像在左侧，符合微信的交互习惯。</div>
                        </div>
                        <div class="wx-bubble-meta">
                            <div class="wx-bubble-time">10:36</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="test-result" class="test-info" style="margin-top: 20px;">
            <h3>🔍 测试结果：</h3>
            <p id="result-text">正在检测...</p>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            console.log('开始检测微信头像位置');
            
            let hasError = false;
            let errorDetails = [];

            // 测试接收消息
            const receivedMsgs = document.querySelectorAll('.wx-msg-row:not(.wx-msg-row-sent)');
            receivedMsgs.forEach((msg, index) => {
                const avatar = msg.querySelector('.wx-msg-avatar');
                const content = msg.querySelector('.wx-msg-content');
                
                if (avatar && content) {
                    const avatarRect = avatar.getBoundingClientRect();
                    const contentRect = content.getBoundingClientRect();
                    
                    if (avatarRect.left < contentRect.left) {
                        console.log(`✅ 接收消息 ${index + 1}: 头像在左侧，正确`);
                    } else {
                        hasError = true;
                        errorDetails.push(`接收消息 ${index + 1}: 头像位置错误`);
                        console.error(`❌ 接收消息 ${index + 1}: 头像位置错误`);
                    }
                }
            });

            // 测试发送消息
            const sentMsgs = document.querySelectorAll('.wx-msg-row-sent');
            sentMsgs.forEach((msg, index) => {
                const avatar = msg.querySelector('.wx-msg-avatar');
                const content = msg.querySelector('.wx-msg-content');
                
                if (avatar && content) {
                    const avatarRect = avatar.getBoundingClientRect();
                    const contentRect = content.getBoundingClientRect();
                    
                    if (avatarRect.right > contentRect.right) {
                        console.log(`✅ 发送消息 ${index + 1}: 头像在右侧，正确`);
                    } else {
                        hasError = true;
                        errorDetails.push(`发送消息 ${index + 1}: 头像位置错误`);
                        console.error(`❌ 发送消息 ${index + 1}: 头像位置错误`);
                    }
                }
            });

            // 显示测试结果
            setTimeout(() => {
                const resultDiv = document.getElementById('test-result');
                const resultText = document.getElementById('result-text');
                
                if (hasError) {
                    resultDiv.className = 'test-info test-error';
                    resultText.innerHTML = `
                        <strong>❌ 检测到错误：</strong><br>
                        ${errorDetails.join('<br>')}
                        <br><br>
                        <strong>可能的解决方案：</strong><br>
                        1. 确保已选择微信平台<br>
                        2. 按 Ctrl+F5 强制刷新页面<br>
                        3. 检查CSS样式是否正确加载
                    `;
                } else {
                    resultDiv.className = 'test-info test-success';
                    resultText.innerHTML = `
                        <strong>✅ 所有测试通过！</strong><br>
                        接收消息头像在左侧<br>
                        发送消息头像在右侧<br>
                        头像背景色正确
                    `;
                }
            }, 1000);
        });
    </script>
</body>
</html>
